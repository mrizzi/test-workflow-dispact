name: Dispatch Test Run

on:
  workflow_run:
    workflows: ["Dispatch Test"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read
  statuses: write

jobs:
  discover:
    name: Discover PR Context
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.metadata.outputs.pr_number }}
      author: ${{ steps.metadata.outputs.author }}
      trusted: ${{ steps.metadata.outputs.trusted }}
    steps:
      - name: Set pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.workflow_run.head_sha,
              state: 'pending',
              description: 'Dispatch test in progress...',
              context: 'Dispatch Test Run',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Download metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: dispatch-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact contents
        run: |
          echo "Artifact downloaded:"
          cat marker.txt

      - name: Resolve PR identity and check trust
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            console.log(`Resolving PR for commit ${headSha}`);

            // listPullRequestsAssociatedWithCommit does not work for fork PRs —
            // the commit lives in the fork, not the base repo's commit graph.
            // Use pulls.list and match by head SHA instead.
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });

            const pr = prs.find(p => p.head.sha === headSha);
            if (!pr) {
              core.warning(`No open PR targeting main found for commit ${headSha}`);
              core.setOutput('pr_number', '');
              core.setOutput('author', '');
              core.setOutput('trusted', 'false');
              return;
            }
            const prNumber = pr.number;
            const author = pr.user.login;
            console.log(`Found PR #${prNumber} by ${author}`);

            core.setOutput('pr_number', prNumber.toString());
            core.setOutput('author', author);

            let trusted = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author
              });
              trusted = ['admin', 'write'].includes(data.permission);
              console.log(`Author ${author}: permission=${data.permission}, trusted=${trusted}`);
            } catch (e) {
              console.log(`Author ${author}: not a collaborator (${e.status}), trusted=false`);
            }

            core.setOutput('trusted', trusted.toString());

      - name: Update status for approval gate
        if: steps.metadata.outputs.trusted != 'true' && steps.metadata.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.workflow_run.head_sha,
              state: 'pending',
              description: 'Waiting for approval in eval-protected environment',
              context: 'Dispatch Test Run',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  gate:
    name: Approval Gate
    needs: discover
    if: >-
      needs.discover.result == 'success' &&
      needs.discover.outputs.trusted != 'true' &&
      needs.discover.outputs.pr_number != ''
    runs-on: ubuntu-latest
    environment: eval-protected
    steps:
      - run: echo "Approved by reviewer"

  prove-secrets:
    name: Prove Secret Access
    needs: [discover, gate]
    if: >-
      !cancelled() &&
      needs.discover.result == 'success' &&
      needs.discover.outputs.pr_number != '' &&
      (needs.discover.outputs.trusted == 'true' || needs.gate.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Verify secret access
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          if [ -z "$TEST_SECRET" ]; then
            echo "::error::TEST_SECRET is not available — secret access failed"
            exit 1
          fi
          echo "Secret is present (length: ${#TEST_SECRET})"

      - name: Post PR comment
        env:
          PR_NUMBER: ${{ needs.discover.outputs.pr_number }}
          PR_AUTHOR: ${{ needs.discover.outputs.author }}
          TRUSTED: ${{ needs.discover.outputs.trusted }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const author = process.env.PR_AUTHOR;
            const trusted = process.env.TRUSTED;
            const headSha = context.payload.workflow_run.head_sha;

            const status = trusted === 'true'
              ? 'trusted'
              : 'gated — approved by reviewer';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '## Dispatch Test Result',
                '',
                '| Field | Value |',
                '|-------|-------|',
                `| Secret access | present |`,
                `| Author | ${author} (${status}) |`,
                `| SHA | \`${headSha.substring(0, 7)}\` |`,
                `| Workflow run | [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              ].join('\n')
            });

  report-status:
    name: Report Status
    needs: [discover, gate, prove-secrets]
    if: >-
      always() &&
      needs.discover.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Set final commit status
        env:
          PROVE_RESULT: ${{ needs.prove-secrets.result }}
          GATE_RESULT: ${{ needs.gate.result }}
        uses: actions/github-script@v7
        with:
          script: |
            const proveResult = process.env.PROVE_RESULT;
            const gateResult = process.env.GATE_RESULT;

            let state, description;
            if (proveResult === 'success') {
              state = 'success';
              description = 'Dispatch test passed — secret access confirmed';
            } else if (gateResult === 'failure') {
              state = 'failure';
              description = 'Approval was rejected in eval-protected environment';
            } else {
              state = 'failure';
              description = 'Dispatch test failed';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.workflow_run.head_sha,
              state,
              description,
              context: 'Dispatch Test Run',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
